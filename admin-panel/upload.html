<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documents — AITD Kanpur Admin</title>
  <meta name="description" content="Upload and manage knowledge base documents for AITD chatbot." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="admin-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="icon">A</div>
        <h2>Admin Panel<span>AITD Kanpur Chatbot</span></h2>
      </div>
      <nav>
        <a href="dashboard.html"><span class="nav-icon">&#9632;</span> Dashboard</a>
        <a href="upload.html" class="active"><span class="nav-icon">&#9654;</span> Documents</a>
        <a href="logs.html"><span class="nav-icon">&#9660;</span> Chat Logs</a>
      </nav>
    </aside>

    <main class="content">
      <h1 class="page-title">Upload Documents</h1>

      <div id="status-msg" class="status-msg"></div>

      <div class="card">
        <h2>Upload New Document</h2>
        <form id="upload-form">
          <div class="form-group">
            <label for="source-type">Document Type</label>
            <select id="source-type">
              <option value="document">PDF Document</option>
              <option value="text_data">Text Data (.txt)</option>
              <option value="csv_data">CSV Data (.csv)</option>
              <option value="circular">Circular / Notice</option>
              <option value="syllabus">Syllabus</option>
              <option value="regulation">Regulation</option>
              <option value="faq">Q&A / FAQ Dataset (.csv)</option>
            </select>
          </div>

          <div class="drop-zone" id="drop-zone">
            <div class="drop-icon">&#128196;</div>
            <p>Drag and drop a file here or click to browse</p>
            <p style="font-size:11px;margin-top:6px;color:#a0aec0;">Supported: PDF, TXT, CSV (Max 10 MB)</p>
            <div class="file-name" id="file-name"></div>
            <input type="file" id="file-input" accept=".pdf,.csv,.txt" style="display:none" />
          </div>

          <button type="submit" class="btn btn-primary">Upload & Ingest</button>
        </form>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <h2 style="margin:0;">Uploaded Documents</h2>
          <button class="btn btn-secondary btn-sm" id="rebuild-btn">Rebuild Index</button>
        </div>
        <div class="doc-list" id="doc-list">
          <p style="color:var(--text-secondary);font-size:13px;">Loading documents...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="js/upload.js"></script>
</body>
</html>
