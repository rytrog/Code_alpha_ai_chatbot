version: '3.8'

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: university_ai_db
    environment:
      POSTGRES_DB: university_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - university-ai

  # ── FastAPI Backend ──
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: university_ai_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/university_ai
      - GEMINI_API_KEY=${GEMINI_API_KEY:-SET_YOUR_GEMINI_API_KEY_HERE}
      - GEMINI_MODEL=gemini-2.5-flash
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - ../uploads:/data/uploads
      - ../chroma:/data/chroma
      - ../logs:/data/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - university-ai

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: university_ai_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../widget:/app/widget:ro
      - ../admin-panel:/app/admin-panel:ro
    depends_on:
      - backend
    networks:
      - university-ai

volumes:
  pgdata:

networks:
  university-ai:
    driver: bridge
