<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AITD Kanpur — AI Chatbot Demo</title>
  <meta name="description" content="Demo page showing the AITD Kanpur AI Chatbot widget." />
  <link rel="stylesheet" href="widget.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f8fa;
      color: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .demo-card {
      text-align: center;
      padding: 48px 36px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      max-width: 480px;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
    }
    .demo-card h1 {
      font-size: 24px;
      margin: 0 0 12px;
      color: #1a365d;
      font-weight: 800;
    }
    .demo-card p {
      font-size: 14px;
      color: #718096;
      line-height: 1.7;
      margin: 0 0 20px;
    }
    .demo-card code {
      display: block;
      background: #f7f8fa;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 12px;
      color: #1a365d;
      border: 1px solid #e2e8f0;
      word-break: break-all;
    }
    .arrow {
      font-size: 24px;
      margin-top: 20px;
      color: #1a365d;
      animation: bounce 1.5s ease infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }
  </style>
</head>
<body>
  <div class="demo-card">
    <h1>AITD Kanpur AI Chatbot</h1>
    <p>
      This demo page shows the chatbot widget integrated via a single script tag.
      Click the chat icon in the bottom-right corner to start a conversation.
    </p>
    <code>&lt;script src="https://aitd.ac.in/chatbot/widget.js"&gt;&lt;/script&gt;</code>
    <div class="arrow">&#8600;</div>
  </div>

  <script src="widget.js?v=1.2"></script>
</body>
</html>
